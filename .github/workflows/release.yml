# Publishes @brandrail/spec, @brandrail/sdk, @brandrail/mcp and the brandrail
# CLI to npm on a version tag. `pnpm publish` rewrites workspace:* deps to the
# real versions automatically. Requires the NPM_TOKEN repo secret — without it
# this workflow (honestly) fails at the publish step rather than pretending.
name: release
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "@brandrail/*" --filter brandrail build
      - run: pnpm --filter "@brandrail/*" --filter brandrail test
      - name: Publish to npm
        run: pnpm --filter "@brandrail/*" --filter brandrail publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
